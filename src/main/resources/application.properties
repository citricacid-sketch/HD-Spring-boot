# DeepSeek API Configuration
spring.ai.openai.base-url=https://api.deepseek.com
# API key should be set via environment variable DEEPSEEK_API_KEY
spring.ai.openai.api-key=${DEEPSEEK_API_KEY:sk-19b3aa614787489a92dd8381314d169e}
spring.ai.openai.chat.options.model=deepseek-chat
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=2000
spring.ai.retry.max-attempts=5
spring.ai.retry.backoff.initial-interval=3000
spring.ai.retry.backoff.multiplier=2
spring.ai.retry.max-interval=10000

# HTTP Client Configuration
spring.cloud.openfeign.client.config.default.connectTimeout=60000
spring.cloud.openfeign.client.config.default.readTimeout=120000

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:travel_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Application configuration
server.port=8080
spring.application.name=travel-platform-backend

# Logging
logging.level.com.travel=DEBUG
logging.level.org.springframework.ai=TRACE