# Production configuration for DeepSeek AI integration
spring.ai.openai.base-url=https://api.deepseek.com
# API key should be set via environment variable DEEPSEEK_API_KEY
spring.ai.openai.api-key=${DEEPSEEK_API_KEY}
# Chat model configuration
spring.ai.openai.chat.options.model=deepseek-chat
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=2000
spring.ai.retry.max-attempts=5
spring.ai.retry.backoff.initial-interval=3000
spring.ai.retry.backoff.multiplier=2
spring.ai.retry.max-interval=10000

# HTTP Client Configuration
spring.cloud.openfeign.client.config.default.connectTimeout=60000
spring.cloud.openfeign.client.config.default.readTimeout=120000

# PostgreSQL Database Configuration (Railway)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# HikariCP Connection Pool Configuration
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA Configuration
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Database Connection Configuration
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=update

# Lazy initialization to allow app to start even if DB is temporarily unavailable
spring.main.lazy-initialization=false

# Disable H2 Console in production
spring.h2.console.enabled=false

# Production server configuration
server.port=${PORT:8080}

# CORS origins (update with your frontend domain)
# CORS origins configured via CORS_ALLOWED_ORIGINS environment variable
# Example: CORS_ALLOWED_ORIGINS=https://your-frontend-domain.netlify.app

# Production logging
logging.level.com.travel=INFO
logging.level.org.springframework.ai=WARN
logging.level.org.springframework=WARN
logging.level.org.springframework.boot=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.com.zaxxer.hikari=INFO
logging.level.org.springframework.jdbc.datasource=INFO

# Security (optional)
# management.endpoints.web.exposure.include=health,info