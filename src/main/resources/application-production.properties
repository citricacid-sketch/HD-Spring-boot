# Production Configuration for Railway Deployment
# This file overrides default settings from application.properties

# PostgreSQL Database Configuration (Railway)
# DATABASE_URL is automatically provided by Railway
# Format: postgresql://user:password@host:port/database
# We need to add jdbc: prefix for PostgreSQL driver
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/railway}

# HikariCP Connection Pool Configuration
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA Configuration for Production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Database Initialization
spring.sql.init.mode=always

# Production server configuration
server.port=${PORT:8080}

# Production logging
logging.level.com.travel=INFO
logging.level.org.springframework.ai=WARN
logging.level.org.springframework=WARN
logging.level.org.springframework.boot=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.com.zaxxer.hikari=INFO
logging.level.org.springframework.jdbc.datasource=INFO
